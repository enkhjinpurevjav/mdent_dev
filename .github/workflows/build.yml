name: Build Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Pin npm version
        run: npm i -g npm@10.9.2
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-build-frontend:
    name: Docker Build Frontend (debug)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build frontend Docker image
        # NEXT_PUBLIC_* vars must be supplied at build time so Next.js can
        # inline them into the compiled output. The values below are
        # build-time defaults used only in CI; they do not affect production
        # deployments (which receive real values via docker-compose build args).
        run: |
          docker build \
            --progress=plain \
            --build-arg NEXT_PUBLIC_API_URL="https://api.mdent.cloud" \
            --build-arg NEXT_PUBLIC_PORTAL_URL="https://mdent.cloud" \
            --build-arg NEXT_PUBLIC_CAPTCHA_KEY="dummy" \
            --build-arg NEXT_PUBLIC_BOOKING_FLOW_VERSION="v1" \
            -t mdent-frontend:ci \
            ./frontend

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Check for build script
        id: check-build
        working-directory: backend
        run: |
          if npm run | grep -q "build"; then
            echo "has_build=true" >> $GITHUB_OUTPUT
          else
            echo "has_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Build backend
        if: steps.check-build.outputs.has_build == 'true'
        working-directory: backend
        run: npm run build
